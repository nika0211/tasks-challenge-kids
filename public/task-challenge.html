/* ─── Sounds ─────────────────────────────────────────────── */
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = type === 'done'
      ? [{ f:440, t:0 }, { f:660, t:0.15 }]
      : [{ f:523, t:0 }, { f:659, t:0.1 }, { f:784, t:0.2 }, { f:1047, t:0.32 }];
    notes.forEach(({ f, t }) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = f;
      osc.type = 'sine';
      const s = ctx.currentTime + t;
      gain.gain.setValueAtTime(0.28, s);
      gain.gain.exponentialRampToValueAtTime(0.001, s + 0.35);
      osc.start(s);
      osc.stop(s + 0.36);
    });
  } catch(e) { /* audio not available */ }
}

/* ─── Timestamp helpers ──────────────────────────────────── */
const formatTimestamp = (iso) => {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())} ${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
};
const TWENTY_FOUR_HOURS = 24 * 60 * 60 * 1000;
const isWithin24h = (iso) => !!iso && (Date.now() - new Date(iso).getTime() < TWENTY_FOUR_HOURS);

/* ─── PIN Pad ────────────────────────────────────────────── */
function PinPad({ value, onChange, onSubmit, accentGradient='from-blue-500 to-blue-700' }) {
  const KEYS = ['1','2','3','4','5','6','7','8','9','←','0','✓'];
  const handle = k => {
    if      (k === '←') onChange(value.slice(0, -1));
    else if (k === '✓') onSubmit();
    else if (value.length < 4) onChange(value + k);
  };
  return (
    <div className="flex flex-col items-center gap-5">
      {/* dots */}
      <div className="flex gap-3">
        {[0,1,2,3].map(i => (
          <div
            key={i}
            className={`w-5 h-5 rounded-full border-2 border-white/70 transition-all duration-200
              ${i < value.length ? 'bg-white scale-110' : 'bg-white/10'}`}
          />
        ))}
      </div>
      {/* grid */}
      <div className="grid grid-cols-3 gap-3">
        {KEYS.map(k => (
          <button
            key={k}
            onClick={() => handle(k)}
            className={`w-[4.2rem] h-[4.2rem] rounded-[1.8rem] text-xl font-bold text-white shadow-lg
              active:scale-90 transition-all duration-150 select-none
              ${k==='✓' ? `bg-gradient-to-br ${accentGradient} shadow-xl`

                : 'glass hover:bg-white/30'}`}
          >{k}</button>
        ))}
      </div>
    </div>
  );
}

/* ─── Set PIN Screen (first login) ───────────────────────── */
function SetPinScreen({ userName, defaultPin, onSetPin, onBack }) {
  const [step,    setStep]    = useState(1); // 1 = choose, 2 = confirm
  const [pin1,    setPin1]    = useState('');
  const [pin2,    setPin2]    = useState('');
  const [shake,   setShake]   = useState(false);
  const [err,     setErr]     = useState('');
  const [saving,  setSaving]  = useState(false);
  const child = CHILDREN.find(c => c.name === userName);

  const triggerErr = msg => {
    setShake(true); setErr(msg);
    if (step === 1) setPin1(''); else setPin2('');
    setTimeout(() => { setShake(false); setErr(''); }, 700);
  };

  const handleStep1 = () => {
    if (pin1.length < 4) { triggerErr('יש להזין 4 ספרות'); return; }
    if (pin1 === defaultPin) { triggerErr('הקוד החדש חייב להיות שונה מהקוד הנוכחי!'); return; }
    setStep(2);
  };

  const handleStep2 = async () => {
    if (pin2 !== pin1) { triggerErr('הקודים אינם תואמים, נסה שוב'); return; }
    setSaving(true);
    await onSetPin(pin1);
  };

  return (
    <div className="flex flex-col items-center justify-center min-h-screen p-5">
      <div className="glass rounded-[3rem] p-8 shadow-2xl w-full max-w-sm pop">
        {step === 1 && <BackBtn onClick={onBack} />}

        {/* Avatar + title */}
        <div className="flex flex-col items-center mb-6">
          <div className={`w-20 h-20 rounded-[2rem] bg-gradient-to-br ${child.gradient}
            flex items-center justify-center shadow-2xl mb-4 relative`}>
            <span className="text-3xl font-black text-white">{child.initial}</span>
            {/* lock badge */}
            <div className="absolute -bottom-2 -left-2 w-8 h-8 rounded-full bg-amber-400
              flex items-center justify-center shadow-lg">
              <Icon name="lock" size={14} className="text-slate-900" />
            </div>
          </div>
          <h2 className="text-2xl font-black text-white">{userName}</h2>

          {step === 1 ? (
            <div className="mt-3 px-4 py-3 rounded-2xl bg-amber-400/15 border border-amber-400/30 text-center">
              <p className="text-amber-300 font-bold text-sm">כניסה ראשונה!</p>
              <p className="text-white/70 text-xs mt-1">בחר קוד סודי אישי שרק אתה יודע</p>
            </div>
          ) : (
            <div className="mt-3 px-4 py-3 rounded-2xl bg-blue-400/15 border border-blue-400/30 text-center">
              <p className="text-blue-300 font-bold text-sm">אשר את הקוד שלך</p>
              <p className="text-white/70 text-xs mt-1">הזן שוב את הקוד שבחרת</p>
            </div>
          )}
        </div>

        {/* Step indicator */}
        <div className="flex items-center justify-center gap-2 mb-5">
          <div className={`h-1.5 w-10 rounded-full transition-all ${step >= 1 ? `bg-gradient-to-r ${child.gradient}` : 'bg-white/20'}`} />
          <div className={`h-1.5 w-10 rounded-full transition-all ${step >= 2 ? `bg-gradient-to-r ${child.gradient}` : 'bg-white/20'}`} />
        </div>

        <div className={shake ? 'shake' : ''}>
          {err && <p className="text-red-300 text-sm font-bold text-center mb-3">{err}</p>}
          {saving ? (
            <div className="flex flex-col items-center gap-3 py-4">
              <div className="w-10 h-10 rounded-full border-4 border-white/30 border-t-white spin-anim" />
              <p className="text-white/70 text-sm">שומר קוד...</p>
            </div>
          ) : step === 1 ? (
            <PinPad value={pin1} onChange={setPin1} onSubmit={handleStep1} accentGradient={child.gradient} />
          ) : (
            <PinPad value={pin2} onChange={setPin2} onSubmit={handleStep2} accentGradient={child.gradient} />
          )}
        </div>
      </div>
    </div>
  );
}

  const [old,    setOld]    = useState('');

  const [pin2,   setPin2]   = useState('');
  const [shake,  setShake]  = useState(false);
  const [err,    setErr]    = useState('');
  const [saving, setSaving] = useState(false);
  const [done,   setDone]   = useState(false);
  const child = CHILDREN.find(c => c.name === userName);

  // Auto-navigate back after success
  useEffect(() => {
    if (done) {
      const t = setTimeout(onBack, 1600);
      return () => clearTimeout(t);
    }
  }, [done]);

  const triggerErr = (msg, clearFn) => {
    setShake(true); setErr(msg); if (clearFn) clearFn();
    setTimeout(() => { setShake(false); setErr(''); }, 700);
  };

  const handleStep1 = () => {
    if (old !== currentPin) {
      triggerErr('הקוד הנוכחי שגוי', () => setOld(''));
      return;
    }
    setStep(2);
  };

  const handleStep2 = () => {
    if (pin1.length < 4) { triggerErr('יש להזין 4 ספרות', () => setPin1('')); return; }
    if (pin1 === currentPin) { triggerErr('הקוד החדש חייב להיות שונה מהנוכחי', () => setPin1('')); return; }
    setStep(3);
  };

  const handleStep3 = async () => {
    if (pin2 !== pin1) { triggerErr('הקודים אינם תואמים', () => setPin2('')); return; }
    setSaving(true);
    await onChangePin(pin1);
    setSaving(false);
    setDone(true);
  };

  const curVal    = step === 1 ? old  : step === 2 ? pin1 : pin2;
  const setCurVal = step === 1 ? setOld : step === 2 ? setPin1 : setPin2;
  const handleSub = step === 1 ? handleStep1 : step === 2 ? handleStep2 : handleStep3;

  const stepLabels = ['הזן את הקוד הנוכחי', 'בחר קוד חדש (4 ספרות)', 'אשר את הקוד החדש'];

  return (
    <div className="flex flex-col items-center justify-center min-h-screen p-5">
      <div className="glass rounded-[3rem] p-8 shadow-2xl w-full max-w-sm pop">
        {!done && <BackBtn onClick={onBack} />}

        {/* Avatar + title */}
        <div className="flex flex-col items-center mb-6">
          <div className={`w-20 h-20 rounded-[2rem] bg-gradient-to-br ${child.gradient}
            flex items-center justify-center shadow-2xl mb-4 relative`}>
            <span className="text-3xl font-black text-white">{child.initial}</span>
            <div className="absolute -bottom-2 -left-2 w-8 h-8 rounded-full bg-sky-400
              flex items-center justify-center shadow-lg">
              <Icon name="key" size={14} className="text-white" />
            </div>
          </div>
          <h2 className="text-2xl font-black text-white">שינוי קוד סודי</h2>
          <p className="text-white/60 text-sm mt-0.5">{userName}</p>

          {!done && (
            <div className="mt-3 px-4 py-2 rounded-2xl bg-sky-400/15 border border-sky-400/30 text-center">
              <p className="text-sky-300 font-bold text-xs">{stepLabels[step - 1]}</p>
            </div>
          )}
        </div>

        {/* Step indicator */}
        {!done && (
          <div className="flex items-center justify-center gap-2 mb-5">
            {[1,2,3].map(s => (
              <div key={s} className={`h-1.5 w-8 rounded-full transition-all
                ${step >= s ? `bg-gradient-to-r ${child.gradient}` : 'bg-white/20'}`} />
            ))}
          </div>
        )}

        {done ? (
          <div className="flex flex-col items-center gap-4 py-6">
            <div className="w-16 h-16 rounded-full bg-green-400/20 flex items-center justify-center">
              <Icon name="check-circle-2" size={44} className="text-green-400" />
            </div>
            <p className="text-white font-black text-xl text-center">הקוד שונה בהצלחה!</p>
            <p className="text-white/50 text-sm text-center">חוזר לדף הבית...</p>
          </div>
        ) : saving ? (
          <div className="flex flex-col items-center gap-3 py-4">
            <div className="w-10 h-10 rounded-full border-4 border-white/30 border-t-white spin-anim" />
            <p className="text-white/70 text-sm">שומר קוד...</p>
          </div>
        ) : (
          <div className={shake ? 'shake' : ''}>
            {err && <p className="text-red-300 text-sm font-bold text-center mb-3">{err}</p>}
            <PinPad
              value={curVal}
              onChange={setCurVal}
              onSubmit={handleSub}
              accentGradient={child.gradient}
            />
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── Prize Wheel ────────────────────────────────────────── */
function PrizeWheel({ childName, currentMilestone, onClose }) {
  const [spinning,  setSpinning]  = useState(false);
  const [wonPrize,  setWonPrize]  = useState(null);
  const wheelRef = useRef(null);
  const SEG = 36; // 360 / 10
  const COLORS = ['#f59e0b','#3b82f6','#ec4899','#10b981','#8b5cf6','#ef4444','#f97316','#06b6d4','#84cc16','#a855f7'];
  const conicGrad = COLORS.map((c, i) => `${c} ${i*SEG}deg ${(i+1)*SEG}deg`).join(', ');

  const spin = () => {
    if (spinning || wonPrize) return;
    const idx = Math.floor(Math.random() * 10);
    const targetDeg = 5 * 360 + (idx * SEG + SEG / 2);
    setSpinning(true);
    if (wheelRef.current) {
      wheelRef.current.style.transition = 'transform 4.2s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
      wheelRef.current.style.transform  = `rotate(${targetDeg}deg)`;
    }
    setTimeout(async () => {
      setWonPrize(PRIZES[idx]);
      fireConfetti();
      playSound('approve');
      await fbPatch('wheelMilestones', { [childName]: currentMilestone });
      await fbDel(`wheelRequests/${childName}`);
      setSpinning(false);
    }, 4400);
  };

  return (
    <div style={{
      position:'fixed', inset:0, zIndex:9999,
      background:'rgba(10,10,40,0.82)',
      backdropFilter:'blur(8px)',
      display:'flex', alignItems:'center', justifyContent:'center',
      padding:'16px',
    }}>
      {wonPrize ? (
        <div style={{animation:'prizePopIn 0.5s ease forwards'}}
          className="glass rounded-[3rem] p-8 max-w-sm w-full text-center shadow-2xl">
          <div style={{fontSize:'56px', marginBottom:'12px'}}>🎉</div>
          <h3 className="text-white font-black text-2xl mb-2">כל הכבוד!</h3>
          <p className="text-white/60 text-sm mb-1">הפרס שלך הוא:</p>
          <div className="glass rounded-[1.5rem] p-4 mb-6 mt-2">
            <p className="text-amber-300 font-black text-lg leading-snug">{wonPrize}</p>
          </div>
          <p className="text-white/50 text-xs mb-5">הראה להורה את הפרס כדי לממש אותו 😊</p>
          <button
            onClick={onClose}
            className="bg-gradient-to-br from-amber-400 to-amber-600 text-white font-black
              px-8 py-3 rounded-full shadow-xl active:scale-95 transition-transform text-lg"
          >
            יאהוו! 🎊
          </button>
        </div>
      ) : (
        <div className="flex flex-col items-center gap-5 w-full max-w-sm">
          <h3 className="text-white font-black text-2xl text-center">🎡 גלגל הפרסים</h3>
          <p className="text-amber-300/90 text-sm text-center font-semibold">
            סיבוב חינמי על הגעה ל-{currentMilestone} נקודות!
          </p>

          {/* Wheel */}
          <div style={{position:'relative', width:'280px', height:'280px', flexShrink:0}}>
            {/* Pointer triangle */}
            <div style={{
              position:'absolute', top:'-4px', left:'50%',
              transform:'translateX(-50%)',
              zIndex:10, width:0, height:0,
              borderLeft:'13px solid transparent',
              borderRight:'13px solid transparent',
              borderTop:'26px solid #fbbf24',
              filter:'drop-shadow(0 2px 4px rgba(0,0,0,0.5))',
            }}/>
            {/* Spinning wheel */}
            <div
              ref={wheelRef}
              style={{
                width:'280px', height:'280px',
                borderRadius:'50%',
                background:`conic-gradient(${conicGrad})`,
                border:'4px solid rgba(255,255,255,0.3)',
                boxShadow:'0 0 28px rgba(251,191,36,0.35)',
                position:'relative',
                overflow:'hidden',
              }}
            >
              {/* Emoji labels on each segment */}
              {PRIZES_EMOJIS.map((emoji, i) => {
                const angleDeg = i * SEG + SEG / 2;
                const angleRad = (angleDeg - 90) * Math.PI / 180;
                const r = 96;
                const x = 140 + r * Math.cos(angleRad);
                const y = 140 + r * Math.sin(angleRad);
                return (
                  <div key={i} style={{
                    position:'absolute',
                    left: x, top: y,
                    transform:`translate(-50%,-50%) rotate(${angleDeg}deg)`,
                    fontSize:'20px',
                    lineHeight:1,
                    pointerEvents:'none',
                    filter:'drop-shadow(0 1px 2px rgba(0,0,0,0.6))',
                  }}>
                    {emoji}
                  </div>
                );
              })}
              {/* Center circle */}
              <div style={{
                position:'absolute', top:'50%', left:'50%',
                transform:'translate(-50%,-50%)',
                width:'44px', height:'44px',
                borderRadius:'50%',
                background:'rgba(255,255,255,0.95)',
                zIndex:5,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:'22px',
                boxShadow:'0 2px 8px rgba(0,0,0,0.3)',
              }}>🎡</div>
            </div>
          </div>

          <button
            onClick={spin}
            disabled={spinning}
            className={`font-black px-12 py-4 rounded-full shadow-2xl text-xl
              transition-transform text-white
              ${spinning
                ? 'opacity-50 cursor-not-allowed bg-slate-600'
                : 'bg-gradient-to-br from-amber-400 to-amber-600 active:scale-95 wheel-btn-pulse'}`}
          >
            {spinning ? 'מסתובב... 🌀' : 'סובב! 🎯'}
          </button>

          {!spinning && (
            <button
              onClick={onClose}
              className="text-white/40 text-sm hover:text-white/70 transition-colors"
            >
              סגור
            </button>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── Child Dashboard ────────────────────────────────────── */
function ChildDashboard({ userName, gs, onTask, onBack, onChangePinRequest }) {
  const child    = CHILDREN.find(c => c.name === userName);
  const myPoints = gs.points[userName] || 0;
  const myRecentTasks = gs.pendingTasks.filter(t => t.childName === userName && isWithin24h(t.timestamp));
  const pendingIds  = new Set(myRecentTasks.filter(t => !t.status || t.status === 'Pending').map(t => t.taskId));
  const approvedIds = new Set(myRecentTasks.filter(t => t.status === 'Approved').map(t => t.taskId));
  const rejectedIds = new Set(myRecentTasks.filter(t => t.status === 'Rejected').map(t => t.taskId));
  const getTaskLog  = id => myRecentTasks.find(t => t.taskId === id);
  const [justDone,  setJustDone]  = useState(null);
  const [showWheel, setShowWheel] = useState(false);

  const lastClaimed      = gs.wheelMilestones?.[userName] || 0;
  const currentMilestone = Math.floor(myPoints / 100) * 100;
  const hasFreeSpin      = myPoints >= 100 && currentMilestone > lastClaimed;
  const wheelRequest     = gs.wheelRequests?.[userName] || null;

  const handle = task => {
    setJustDone(task.id);
    setTimeout(() => setJustDone(null), 800);
    onTask(task);
  };

  const handleRequestSpin = () => {
    fbPatch('wheelRequests', { [userName]: 'pending' });
  };

  return (
    <div className="flex flex-col min-h-screen p-4 pb-10 gap-4">
      {showWheel && (
        <PrizeWheel
          childName={userName}
          currentMilestone={currentMilestone}
          onClose={() => setShowWheel(false)}
        />
      )}

      {/* header */}
      <div className="glass rounded-[3rem] p-6 shadow-2xl mt-4 pop">
        <BackBtn onClick={onBack} />
        <div className="flex items-center gap-4">
          <div className={`w-16 h-16 rounded-[1.5rem] bg-gradient-to-br ${child.gradient}
            flex items-center justify-center text-2xl font-black text-white shadow-xl`}>
            {child.initial}
          </div>
          <div className="flex-1 min-w-0">
            <h2 className="text-2xl font-black text-white">שלום, {userName}!</h2>
            <div className="flex items-center gap-1.5 mt-1">
              <Icon name="star" size={16} className="text-amber-400" />
              <span className="text-amber-300 font-bold text-lg">{myPoints} נקודות</span>
            </div>
            {/* Change password link */}
            <button
              onClick={onChangePinRequest}
              className="flex items-center gap-1 mt-2 text-white/40 hover:text-white/70 transition-colors"
            >
              <Icon name="key" size={12} className="text-white/40" />
              <span className="text-xs">שינוי קוד סודי</span>
            </button>
          </div>
        </div>
      </div>

      {/* Prize wheel banners */}
      {hasFreeSpin && !wheelRequest && (
        <button
          onClick={handleRequestSpin}
          className="glass rounded-[2rem] p-5 shadow-2xl wheel-btn-pulse text-center w-full"
        >
          <div className="text-3xl mb-1">🎡</div>
          <p className="text-white font-black text-base">הגעת ל-{currentMilestone} נקודות!</p>
          <p className="text-amber-300 font-semibold text-sm mt-1">לחץ לבקש סיבוב חינמי בגלגל הפרסים</p>
        </button>
      )}

      {hasFreeSpin && wheelRequest === 'pending' && (
        <div className="glass rounded-[2rem] p-5 shadow-xl text-center">
          <div className="text-3xl mb-1">⏳</div>
          <p className="text-white font-bold text-base">הבקשה נשלחה להורה!</p>
          <p className="text-white/60 text-sm mt-1">ממתין לאישור... הגלגל יפתח בקרוב</p>
        </div>
      )}

      {hasFreeSpin && wheelRequest === 'approved' && (
        <button
          onClick={() => setShowWheel(true)}
          className="glass rounded-[2rem] p-5 shadow-2xl wheel-btn-pulse text-center w-full"
        >
          <div className="text-3xl mb-1">🎉</div>
          <p className="text-white font-black text-base">ההורה אישר!</p>
          <p className="text-amber-300 font-semibold text-sm mt-1">לחץ לסובב את גלגל הפרסים!</p>
        </button>
      )}

      <p className="text-white/80 font-bold px-2">משימות זמינות:</p>

      <div className="flex flex-col gap-3">
        {TASKS.map(task => {
          const isPending  = pendingIds.has(task.id);
          const isApproved = approvedIds.has(task.id);
          const isRejected = rejectedIds.has(task.id);
          const log = (isPending || isApproved || isRejected) ? getTaskLog(task.id) : null;
          const iconBg = isPending  ? 'bg-amber-400/30'
                       : isApproved ? 'bg-green-400/30'
                       : isRejected ? 'bg-red-400/30'
                       : `bg-gradient-to-br ${child.gradient}`;
          return (
            <div
              key={task.id}
              className={`glass rounded-[2rem] p-5 shadow-xl flex items-center gap-4 transition-all
                ${justDone === task.id ? 'scale-95 opacity-50' : 'pop'}
                ${task.golden ? 'golden-task' : ''}`}

              <div className={`w-12 h-12 rounded-[1.2rem] flex items-center justify-center shadow-md flex-shrink-0 ${iconBg}`}>
                <span className="text-2xl leading-none">{task.icon}</span>
              </div>

              <div className="flex-1 min-w-0">
                <p className="text-white font-semibold text-sm leading-snug">{task.name}</p>
                {task.golden && (
                  <div className="golden-badge">⭐ משימת הזהב</div>

                <div className="flex items-center gap-1 mt-1">
                  <Icon name="zap" size={12} className="text-amber-400" />
                  <span className="text-amber-300 text-xs font-bold">{task.points} נקודות</span>
                </div>
                {log && (
                  <p className="text-white/45 text-xs mt-0.5">בוצע ב: {formatTimestamp(log.timestamp)}</p>

              {isPending ? (
                <div className="flex items-center gap-1.5 bg-amber-400/20 px-3 py-2 rounded-full flex-shrink-0">
                  <Icon name="clock" size={14} className="text-amber-400" />
                  <span className="text-amber-300 text-xs font-bold">ממתין</span>
                </div>
              ) : isApproved ? (
                <div className="flex items-center gap-1.5 bg-green-400/20 px-3 py-2 rounded-full flex-shrink-0">
                  <Icon name="check-circle-2" size={14} className="text-green-400" />
                  <span className="text-green-300 text-xs font-bold">אושר ✓</span>
                </div>
              ) : isRejected ? (
                <div className="flex flex-col items-end gap-1.5 flex-shrink-0">
                  <div className="flex items-center gap-1 bg-red-400/20 px-3 py-1.5 rounded-full">
                    <Icon name="x-circle" size={13} className="text-red-400" />
                    <span className="text-red-300 text-xs font-bold">נדחה</span>
                  </div>
                  <button
                    onClick={() => handle(task)}
                    className={`bg-gradient-to-br ${child.gradient} text-white text-xs font-bold
                      px-4 py-1.5 rounded-full shadow-lg active:scale-90 transition-transform`}
                  >
                    שוב
                  </button>
                </div>
              ) : (
                <button
                  onClick={() => handle(task)}
                  className={`bg-gradient-to-br ${child.gradient} text-white text-xs font-bold
                    px-5 py-2.5 rounded-full shadow-lg active:scale-90 transition-transform flex-shrink-0`}
                >
                  בוצע!
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── Parent Dashboard ───────────────────────────────────── */
function ParentDashboard({ gs, onApprove, onReject, onDeduct, onAdd, onBack, onApproveWheel, onRejectWheel, onChangeParentPin }) {
  const sorted   = [...CHILDREN].sort((a,b) => (gs.points[b.name]||0) - (gs.points[a.name]||0));
  const leadName = sorted[0]?.name;
  const hasPoints = sorted.some(c => (gs.points[c.name]||0) > 0);
  const [deductInputs, setDeductInputs] = React.useState({});
  const [addInputs, setAddInputs] = React.useState({});
  const trulyPending = gs.pendingTasks.filter(t => (!t.status || t.status === 'Pending') && isWithin24h(t.timestamp));
  const historyTasks = gs.pendingTasks.filter(t => (t.status === 'Approved' || t.status === 'Rejected') && isWithin24h(t.timestamp));

  return (
    <div className="flex flex-col min-h-screen p-4 pb-10 gap-4">
      {/* header */}
      <div className="glass rounded-[3rem] p-6 shadow-2xl mt-4 pop">
        <BackBtn onClick={onBack} />
        <div className="flex items-center gap-3">
          <div className="w-12 h-12 rounded-[1.2rem] bg-gradient-to-br from-slate-600 to-slate-800
            flex items-center justify-center shadow-xl">
            <Icon name="shield-check" size={24} className="text-white" />
          </div>
          <div className="flex-1">
            <h2 className="text-2xl font-black text-white">לוח הורים</h2>
            <p className="text-white/60 text-xs">{trulyPending.length} משימות ממתינות לאישור</p>
          </div>
          <button onClick={onChangeParentPin}
            className="flex items-center gap-1.5 bg-white/10 hover:bg-white/20 active:scale-95
              transition-all px-3 py-2 rounded-2xl border border-white/20 shadow-md">
            <Icon name="key" size={15} className="text-amber-300" />
            <span className="text-white/80 text-xs font-bold">שינוי סיסמה</span>
          </button>
        </div>
      </div>

      {/* scoreboard */}
      <div className="glass rounded-[3rem] p-6 shadow-2xl pop">
        <h3 className="text-white font-bold text-base mb-4 flex items-center gap-2">
          <Icon name="trophy" size={18} className="text-amber-400" />
          טבלת ניקוד
        </h3>
        <div className="flex flex-col gap-2">
          {sorted.map((child, idx) => (
            <div key={child.name} className="flex items-center gap-3 p-3 rounded-[1.5rem] bg-white/10">
              <span className="text-white/50 font-black w-5 text-center text-sm">{idx+1}</span>
              <div className={`w-9 h-9 rounded-full ${child.bg} flex items-center justify-center
                text-sm font-black text-white shadow-md`}>
                {child.initial}
              </div>
              <span className="text-white font-bold flex-1 flex items-center gap-2">
                {child.name}
                {hasPoints && child.name === leadName &&
                  <Icon name="crown" size={15} className="text-amber-400" />}
              </span>
              <div className="flex items-center gap-1">
                <span className="text-amber-300 font-black text-sm">{gs.points[child.name]||0}</span>
                <Icon name="star" size={13} className="text-amber-400" />
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* passwords */}
      <div className="glass rounded-[3rem] p-6 shadow-2xl pop">
        <h3 className="text-white font-bold text-base mb-4 flex items-center gap-2">
          <Icon name="key" size={18} className="text-sky-400" />
          קודים סודיים
        </h3>
        <div className="flex flex-col gap-2">
          {CHILDREN.map(child => (
            <div key={child.name} className="flex items-center gap-3 p-3 rounded-[1.5rem] bg-white/10">
              <div className={`w-9 h-9 rounded-full ${child.bg} flex items-center justify-center
                text-sm font-black text-white shadow-md flex-shrink-0`}>
                {child.initial}
              </div>
              <span className="text-white font-bold flex-1">{child.name}</span>
              <span className="bg-white/15 border border-white/25 text-white font-mono font-black
                text-base px-4 py-1.5 rounded-full tracking-widest">
                {gs.pins[child.name] || child.pin}
              </span>
            </div>
          ))}
        </div>
      </div>

      {/* deduct points */}
      <div className="glass rounded-[3rem] p-6 shadow-2xl pop">
        <h3 className="text-white font-bold text-base mb-4 flex items-center gap-2">
          <Icon name="minus-circle" size={18} className="text-red-400" />
          הורדת נקודות
        </h3>
        <div className="flex flex-col gap-2">
          {CHILDREN.map(child => (
            <div key={child.name} className="flex items-center gap-3 p-3 rounded-[1.5rem] bg-white/10">
              <div className={`w-9 h-9 rounded-full ${child.bg} flex items-center justify-center
                text-sm font-black text-white shadow-md flex-shrink-0`}>
                {child.initial}
              </div>
              <span className="text-white font-bold flex-1">{child.name}</span>
              <input
                type="number"
                min="1"
                value={deductInputs[child.name] || ''}
                onChange={e => setDeductInputs(prev => ({ ...prev, [child.name]: e.target.value }))}
                placeholder="כמות"
                className="w-16 bg-white/10 border border-white/20 text-white text-center font-bold text-sm
                  rounded-xl px-2 py-1.5 outline-none focus:border-red-400/60"
              />
              <button
                onClick={() => {
                  onDeduct(child.name, deductInputs[child.name]);
                  setDeductInputs(prev => ({ ...prev, [child.name]: '' }));
                }}
                className="bg-red-500/30 hover:bg-red-500/50 text-red-300 text-xs font-bold
                  px-3 py-2 rounded-full transition-colors flex items-center gap-1 flex-shrink-0"
              >
                <Icon name="minus" size={13} className="text-red-300" />
                הורד
              </button>
              <input
                type="number"
                min="1"
                value={addInputs[child.name] || ''}
                onChange={e => setAddInputs(prev => ({ ...prev, [child.name]: e.target.value }))}
                placeholder="כמות"
                className="w-16 bg-white/10 border border-white/20 text-white text-center font-bold text-sm
                  rounded-xl px-2 py-1.5 outline-none focus:border-green-400/60"
              />
              <button
                onClick={() => {
                  onAdd(child.name, addInputs[child.name]);
                  setAddInputs(prev => ({ ...prev, [child.name]: '' }));
                }}
                className="bg-green-500/30 hover:bg-green-500/50 text-green-300 text-xs font-bold
                  px-3 py-2 rounded-full transition-colors flex items-center gap-1 flex-shrink-0"
              >
                <Icon name="plus" size={13} className="text-green-300" />
                הוסף
              </button>
            </div>
          ))}
        </div>
      </div>

      {/* wheel requests */}
      {Object.entries(gs.wheelRequests || {}).filter(([, s]) => s === 'pending').length > 0 && (<>
        <p className="text-white/80 font-bold px-2 flex items-center gap-2">
          <span>🎡</span>
          בקשות גלגל פרסים
          <span className="bg-purple-400 text-white text-xs font-black px-2 py-0.5 rounded-full">
            {Object.entries(gs.wheelRequests || {}).filter(([, s]) => s === 'pending').length}
          </span>
        </p>
        <div className="flex flex-col gap-3">
          {Object.entries(gs.wheelRequests || {})
            .filter(([, s]) => s === 'pending')
            .map(([childName]) => {
              const child = CHILDREN.find(c => c.name === childName);
              const pts   = gs.points[childName] || 0;
              const milestone = Math.floor(pts / 100) * 100;
              return (
                <div key={childName} className="glass rounded-[2rem] p-5 shadow-xl flex flex-col gap-3 pop">
                  <div className="flex items-center gap-4">
                    <div className={`w-12 h-12 rounded-[1.2rem] bg-gradient-to-br ${child?.gradient||'from-gray-500 to-gray-700'}
                      flex items-center justify-center shadow-md flex-shrink-0 text-2xl`}>
                      🎡
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="text-white font-bold text-sm">
                        {childName} מבקש לסובב את גלגל הפרסים!
                      </p>
                      <div className="flex items-center gap-1.5 mt-1">
                        <Icon name="star" size={12} className="text-amber-400" />
                        <span className="text-amber-300 text-xs font-bold">{pts} נקודות</span>
                        <span className="text-white/40 text-xs">• הגיע ל-{milestone}</span>
                      </div>
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <button
                      onClick={() => onApproveWheel(childName)}
                      className="flex-1 bg-gradient-to-br from-purple-500 to-purple-700 text-white text-sm font-bold
                        py-2.5 rounded-full shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-1.5"
                    >
                      <Icon name="check" size={15} className="text-white" />
                      אשר סיבוב
                    </button>
                    <button
                      onClick={() => onRejectWheel(childName)}
                      className="flex-1 bg-gradient-to-br from-red-500 to-rose-600 text-white text-sm font-bold
                        py-2.5 rounded-full shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-1.5"
                    >
                      <Icon name="x" size={15} className="text-white" />
                      דחה
                    </button>
                  </div>
                </div>
              );
            })}
        </div>
      </>)}

      {/* pending */}
      <p className="text-white/80 font-bold px-2 flex items-center gap-2">
        <Icon name="clock" size={16} className="text-amber-400" />
        ממתין לאישור
        {trulyPending.length > 0 && (
          <span className="bg-amber-400 text-slate-900 text-xs font-black px-2 py-0.5 rounded-full">
            {trulyPending.length}
          </span>
        )}
      </p>

      {trulyPending.length === 0 ? (
        <div className="glass rounded-[2.5rem] p-8 text-center shadow-xl pop">
          <Icon name="check-circle-2" size={48} className="text-green-400 mx-auto mb-3" />
          <p className="text-white/80 font-semibold">הכל מאושר! אין משימות ממתינות</p>
        </div>
      ) : (
        <div className="flex flex-col gap-3">
          {trulyPending.map(task => {
            const child   = CHILDREN.find(c => c.name === task.childName);
            const taskDef = TASKS.find(t => t.id === task.taskId);
            return (
              <div key={task.fbKey} className="glass rounded-[2rem] p-5 shadow-xl flex flex-col gap-3 pop">
                <div className="flex items-center gap-4">
                  <div className={`w-12 h-12 rounded-[1.2rem] bg-gradient-to-br ${child?.gradient||'from-gray-500 to-gray-700'}
                    flex items-center justify-center shadow-md flex-shrink-0`}>
                    <span className="text-2xl leading-none">{taskDef?.icon || '✓'}</span>
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="text-white font-bold text-sm leading-snug">{task.taskName}</p>
                    <div className="flex items-center gap-2 mt-1">
                      <div className={`w-3 h-3 rounded-full ${child?.bg||'bg-gray-500'}`} />
                      <span className="text-white/60 text-xs">{task.childName}</span>
                      <Icon name="zap" size={11} className="text-amber-400" />
                      <span className="text-amber-300 text-xs font-bold">{task.taskPoints} נק'</span>
                    </div>
                    {task.timestamp && (
                      <p className="text-white/45 text-xs mt-0.5">בוצע ב: {formatTimestamp(task.timestamp)}</p>
                    )}
                  </div>
                </div>
                <div className="flex gap-2">
                  <button
                    onClick={() => onApprove(task)}
                    className="flex-1 bg-gradient-to-br from-green-500 to-emerald-600 text-white text-sm font-bold
                      py-2.5 rounded-full shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-1.5"
                  >
                    <Icon name="check" size={15} className="text-white" />
                    אשר
                  </button>
                  <button
                    onClick={() => onReject(task)}
                    className="flex-1 bg-gradient-to-br from-red-500 to-rose-600 text-white text-sm font-bold
                      py-2.5 rounded-full shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-1.5"
                  >
                    <Icon name="x" size={15} className="text-white" />
                    דחה
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {historyTasks.length > 0 && (<>
        <p className="text-white/80 font-bold px-2 flex items-center gap-2 mt-2">
          <Icon name="history" size={16} className="text-white/50" />
          היסטוריה (24 שעות)
        </p>
        <div className="flex flex-col gap-3">
          {historyTasks.map(task => {
            const child   = CHILDREN.find(c => c.name === task.childName);
            const taskDef = TASKS.find(t => t.id === task.taskId);
            const isApproved = task.status === 'Approved';
            return (
              <div key={task.fbKey} className="glass rounded-[2rem] p-5 shadow-xl flex items-center gap-4 pop opacity-80">
                <div className={`w-12 h-12 rounded-[1.2rem] bg-gradient-to-br ${child?.gradient||'from-gray-500 to-gray-700'}
                  flex items-center justify-center shadow-md flex-shrink-0`}>
                  <span className="text-2xl leading-none">{taskDef?.icon || '✓'}</span>
                </div>
                <div className="flex-1 min-w-0">
                  <p className="text-white font-bold text-sm leading-snug">{task.taskName}</p>
                  <div className="flex items-center gap-2 mt-1">
                    <div className={`w-3 h-3 rounded-full ${child?.bg||'bg-gray-500'}`} />
                    <span className="text-white/60 text-xs">{task.childName}</span>
                    <Icon name="zap" size={11} className="text-amber-400" />
                    <span className="text-amber-300 text-xs font-bold">{task.taskPoints} נק'</span>
                  </div>
                  {task.timestamp && (
                    <p className="text-white/45 text-xs mt-0.5">בוצע ב: {formatTimestamp(task.timestamp)}</p>
                  )}
                </div>
                <div className={`flex items-center gap-1.5 px-3 py-2 rounded-full flex-shrink-0
                  ${isApproved ? 'bg-green-400/20' : 'bg-red-400/20'}`}>
                  <Icon name={isApproved ? 'check-circle-2' : 'x-circle'} size={14}
                    className={isApproved ? 'text-green-400' : 'text-red-400'} />
                  <span className={`text-xs font-bold ${isApproved ? 'text-green-300' : 'text-red-300'}`}>
                    {isApproved ? 'אושר' : 'נדחה'}
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      </>)}
    </div>
  );
}

/* ─── App ────────────────────────────────────────────────── */
function App() {
  const [view,    setView]    = useState('welcome');
  const [selUser, setSelUser] = useState(null);
  const [selRole, setSelRole] = useState(null);
  const [gs,      setGs]      = useState(null); // null = loading

  /* ── Firebase sync: immediate fetch + SSE real-time + polling fallback */
  useEffect(() => {
    let alive = true;
    let es    = null;

    // Apply raw DB snapshot to state (synchronous)
    const applyData = (raw) => {
      if (!alive) return;
      const data = raw || {};
      const ptObj = data.pendingTasks || {};
      const ptArr = Object.entries(ptObj).map(([fbKey, t]) => ({ ...t, fbKey }));
      setGs({
        points:          { ...INIT_POINTS, ...(data.points || {}) },
        pendingTasks:    ptArr,
        pins:            data.pins || {},
        wheelMilestones: data.wheelMilestones || {},
        wheelRequests:   data.wheelRequests   || {},
        parentPin:       data.parentPin || null,
      });
    };

    // REST fetch helper used for initial load and SSE fallback
    const fetchAndApply = () =>
      fbGet()
        .then(applyData)
        .catch(err => {
          console.error('Firebase fetch error:', err);
          if (alive) setGs(prev => prev ?? { points: INIT_POINTS, pendingTasks: [], pins: {}, wheelMilestones: {}, wheelRequests: {}, parentPin: null, dbError: true });
        });

    // 1️⃣ Immediate REST fetch so the app renders without waiting for SSE
    const init = async () => {
      try {
        const data = (await fbGet()) || {};
        if (!data.points) await fbPut('points', INIT_POINTS).catch(() => {});
        applyData(data);
        // Delete pendingTasks entries older than 24h to keep DB lean
        const cutoff = Date.now() - TWENTY_FOUR_HOURS;
        Object.entries(data.pendingTasks || {}).forEach(([key, t]) => {
          if (t.timestamp && new Date(t.timestamp).getTime() < cutoff) {
            fbDel(`pendingTasks/${key}`).catch(() => {});
          }
        });
      } catch(e) {
        console.error('Init fetch error:', e);
        if (alive) setGs({ points: INIT_POINTS, pendingTasks: [], pins: {}, wheelMilestones: {}, wheelRequests: {}, parentPin: null, dbError: true });
      }
    };
    init();

    // 2️⃣ SSE for instant real-time updates across all devices
    try {
      es = new EventSource(`${DB}/.json`);

      es.addEventListener('put', (e) => {
        if (!alive) return;
        try {
          const { path, data } = JSON.parse(e.data);
          if (path === '/') {
            applyData(data);           // full snapshot (initial SSE payload)
          } else {
            fetchAndApply();           // partial update → refetch full state
          }
        } catch (err) {
          console.error('SSE parse error:', err);
          fetchAndApply();
        }
      });

      es.addEventListener('patch', () => { if (alive) fetchAndApply(); });
      es.addEventListener('cancel', () => { if (es) { es.close(); es = null; } });
      es.onerror = () => { if (es) { es.close(); es = null; } }; // polling covers reconnect
    } catch(e) {
      // EventSource not supported in this environment – polling below covers it
    }

    // 3️⃣ Polling fallback (every 3 s) – ensures sync even if SSE is unavailable
    const timer = setInterval(fetchAndApply, 3000);

    return () => {
      alive = false;
      if (es) { es.close(); es = null; }
      clearInterval(timer);
    };
  }, []);

  /* ── Refresh Lucide icons after every render */
  useEffect(() => { window.lucide?.createIcons(); });

  /* ── Determine effective PIN for a user */
  const getEffectivePin = (name, role) => {
    if (role === 'parent') return gs?.parentPin || PARENT_PIN;
    const customPin = gs?.pins?.[name];
    if (customPin) return customPin;
    const child = CHILDREN.find(c => c.name === name);
    return child?.pin;
  };

  /* ── Handlers */
  const handleSelect = (name, role) => {
    setSelUser(name);
    setSelRole(role);
    setView('pin');
  };

  const handleBack = () => {
    setView('welcome');
    setSelUser(null);
    setSelRole(null);
  };

  const handleLogin = () => {
    if (selRole === 'parent') {
      setView('parentDashboard');
    } else {
      // First-time login: no custom PIN set yet → force PIN change
      const hasCustomPin = gs?.pins?.[selUser];
      if (!hasCustomPin) {
        setView('setPin');
      } else {
        setView('childDashboard');
      }
    }
  };

  const handleSetPin = async (newPin) => {
    await fbPatch('pins', { [selUser]: newPin });
    // Update local state immediately for instant feedback
    setGs(prev => prev ? { ...prev, pins: { ...prev.pins, [selUser]: newPin } } : prev);
    setView('childDashboard');
  };

  const handleChangePinRequest = () => setView('changePin');

  const handleChangePin = async (newPin) => {
    await fbPatch('pins', { [selUser]: newPin });
    // Update local state immediately so effectivePin is current
    setGs(prev => prev ? { ...prev, pins: { ...prev.pins, [selUser]: newPin } } : prev);
  };

  const handleChangeParentPin = async (newPin) => {
    await fbPatch('', { parentPin: newPin });
    setGs(prev => prev ? { ...prev, parentPin: newPin } : prev);
  };

  const handleTask = task => {
    playSound('done');
    fbPost('pendingTasks', {
      taskId:     task.id,
      taskName:   task.name,
      taskPoints: task.points,
      childName:  selUser,
      timestamp:  new Date().toISOString(),
      status:     'Pending',
    });
  };

  const handleReject = async task => {
    await fbPatch(`pendingTasks/${task.fbKey}`, { status: 'Rejected' });
  };

  const handleApprove = async task => {
    const newPts = (gs.points[task.childName] || 0) + task.taskPoints;
    await fbPatch('points', { [task.childName]: newPts });
    await fbPatch(`pendingTasks/${task.fbKey}`, { status: 'Approved' });
    fireConfetti();
    playSound('approve');
  };

  const handleDeduct = async (childName, amt) => {
    const amtInt = parseInt(amt, 10);
    if (!amtInt || amtInt <= 0) return;
    const currentPts = gs.points[childName] || 0;
    const newPts = Math.max(0, currentPts - amtInt);
    try {
      const res = await fbPatch('points', { [childName]: newPts });
      if (!res.ok) throw new Error(`Firebase error: ${res.status}`);
      setGs(prev => prev ? { ...prev, points: { ...prev.points, [childName]: newPts } } : prev);
    } catch (err) { console.error('handleDeduct', err); }
  };

  const handleAdd = async (childName, amt) => {
    const amtInt = parseInt(amt, 10);
    if (!amtInt || amtInt <= 0) return;
    const currentPts = gs.points[childName] || 0;
    const newPts = currentPts + amtInt;
    try {
      const res = await fbPatch('points', { [childName]: newPts });
      if (!res.ok) throw new Error(`Firebase error: ${res.status}`);
      setGs(prev => prev ? { ...prev, points: { ...prev.points, [childName]: newPts } } : prev);
    } catch (err) { console.error('handleAdd', err); }
  };

  const handleApproveWheel = (childName) => {
    fbPatch('wheelRequests', { [childName]: 'approved' });
  };

  const handleRejectWheel = (childName) => {
    fbDel(`wheelRequests/${childName}`);
  };

  /* ── Render */
  if (!gs) return <LoadingScreen />;
  if (gs.dbError) return (
    <div className="flex items-center justify-center min-h-screen p-5">
      <div className="glass rounded-[3rem] p-10 shadow-2xl flex flex-col items-center gap-4 max-w-sm w-full text-center">
        <Icon name="wifi-off" size={48} className="text-red-400" />
        <p className="text-white font-black text-xl">שגיאת חיבור</p>
        <p className="text-white/70 text-sm">לא ניתן להתחבר ל-Firebase.<br/>בדוק כללי אבטחה ורשת.</p>
        <button onClick={() => window.location.reload()}
          className="bg-gradient-to-br from-blue-500 to-blue-700 text-white font-bold px-6 py-3 rounded-full shadow-lg active:scale-95 transition-transform">
          נסה שוב
        </button>
      </div>
    </div>
  );

  const effectivePin = selUser ? getEffectivePin(selUser, selRole) : null;
  const defaultPin   = selUser && selRole === 'child'
    ? CHILDREN.find(c => c.name === selUser)?.pin
    : null;

  return (
    <div className="max-w-md mx-auto" dir="rtl">
      {view === 'welcome'         && <WelcomeScreen onSelect={handleSelect} />}
      {view === 'pin'             && <PinScreen
                                        userName={selUser}
                                        userRole={selRole}
                                        correctPin={effectivePin}
                                        onBack={handleBack}
                                        onSuccess={handleLogin}
                                     />}
      {view === 'setPin'          && <SetPinScreen
                                        userName={selUser}
                                        defaultPin={defaultPin}
                                        onSetPin={handleSetPin}
                                        onBack={handleBack}
                                     />}
      {view === 'changePin'       && <ChangePinScreen
                                        userName={selUser}
                                        currentPin={effectivePin}
                                        onChangePin={handleChangePin}
                                        onBack={() => setView('childDashboard')}
                                     />}
      {view === 'childDashboard'  && <ChildDashboard
                                        userName={selUser}
                                        gs={gs}
                                        onTask={handleTask}
                                        onBack={handleBack}
                                        onChangePinRequest={handleChangePinRequest}
                                     />}
      {view === 'parentDashboard' && <ParentDashboard gs={gs} onApprove={handleApprove} onReject={handleReject} onDeduct={handleDeduct} onAdd={handleAdd} onBack={handleBack} onApproveWheel={handleApproveWheel} onRejectWheel={handleRejectWheel} onChangeParentPin={() => setView('changeParentPin')} />}
      {view === 'changeParentPin' && <ChangeParentPinScreen
                                        currentPin={gs?.parentPin || PARENT_PIN}
                                        onChangePin={handleChangeParentPin}
                                        onBack={() => setView('parentDashboard')}
                                     />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
